<div class="container">

  <!-- 入院手続き -->
  <div class="sec-label">Admission</div>
  <div class="sec-title">入院手続き</div>
  <div class="sec-line"></div>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-body">
        <div class="step-title">入院が決まったら</div>
        <div class="step-desc">担当医より入院の説明があります。入院日・病棟・注意事項についてご確認ください。不明な点は遠慮なくお申し出ください。</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-body">
        <div class="step-title">入院受付（1階 総合受付）</div>
        <div class="step-desc">健康保険証・各種医療証をお持ちください。入院誓約書・同意書など必要書類への記入をお願いします。</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-body">
        <div class="step-title">病棟へのご案内</div>
        <div class="step-desc">看護師が病室にご案内します。入院中の生活についての説明を行います。</div>
      </div>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <div class="step-body">
        <div class="step-title">入院費のお支払い</div>
        <div class="step-desc">入院費は月末締めで翌月初旬にご請求します。現金またはカード（一部対応）にてお支払いください。</div>
      </div>
    </div>
  </div>

  <!-- 持ち物 -->
  <div class="sec-label">Checklist</div>
  <div class="sec-title">入院時の持ち物</div>
  <div class="sec-line"></div>
  <div class="card">
    <div class="card-title">必ずお持ちいただくもの</div>
    <ul class="checklist">
      <li>健康保険証・各種医療証・介護保険証（お持ちの方）</li>
      <li>お薬手帳・現在服用中のお薬</li>
      <li>入院誓約書（入院受付でお渡しします）</li>
      <li>印鑑</li>
    </ul>
  </div>
  <div class="card" style="margin-top:-16px;">
    <div class="card-title">日常生活に必要なもの</div>
    <ul class="checklist">
      <li>パジャマ・寝巻き（2〜3着程度）</li>
      <li>タオル・バスタオル（3〜4枚程度）</li>
      <li>洗面用具（歯ブラシ・歯磨き粉・シャンプーなど）</li>
      <li>スリッパまたは滑り止め付き靴下</li>
      <li>ティッシュペーパー</li>
    </ul>
  </div>
  <div class="alert-box">
    <strong>貴重品のお取り扱いについて</strong>
    多額の現金や貴重品はお持ちにならないようお願いします。当院では貴重品の紛失・盗難について責任を負いかねます。
  </div>

  <!-- 面会について -->
  <div id="menkai"></div>
  <div class="sec-label">Visiting</div>
  <div class="sec-title">面会について</div>
  <div class="sec-line"></div>

  <div class="menkai-box">
    <div class="menkai-title">面会時間・ご案内</div>
    <div class="menkai-grid">
      <div class="menkai-item">
        <div class="label">面会時間（全日）</div>
        <div class="val">14:00 〜 19:00</div>
        <div class="note">土日祝日も同様です</div>
      </div>
      <div class="menkai-item">
        <div class="label">オンライン面会</div>
        <div class="val">随時対応</div>
        <div class="note">遠方の方もビデオ通話で<br>面会いただけます</div>
      </div>
    </div>
    <a href="online-menkai/" class="online-btn">オンライン面会のお申し込みはこちら</a>
  </div>

  <div class="card">
    <div class="card-title">面会時のお願い</div>
    <table class="info-table">
      <tr>
        <th>感染症対策</th>
        <td>発熱・咳・下痢などの症状がある方の面会はご遠慮ください。手指消毒にご協力をお願いします。</td>
      </tr>
      <tr>
        <th>面会人数</th>
        <td>病室内の混雑防止のため、同時に多人数での面会はご遠慮いただく場合があります。</td>
      </tr>
      <tr>
        <th>お子様の面会</th>
        <td>中学生以下のお子様の面会は保護者の方とご一緒にお願いします。</td>
      </tr>
      <tr>
        <th>飲食物の持込</th>
        <td>食事制限のある患者様への飲食物の持込はご遠慮ください。事前に看護師にご確認ください。</td>
      </tr>
      <tr>
        <th>写真・動画</th>
        <td>他の患者様のプライバシー保護のため、病室内での撮影はご遠慮ください。</td>
      </tr>
    </table>
  </div>
